{{define "settings"}}
<!-- ── SETTINGS VIEW ── -->
<div id="view-settings" x-show="view === 'settings'">
  <div class="settings">
    <header class="settings-header">
      <span class="wordmark small">Explo</span>
      <nav>
        <button class="tab-btn" :class="{ active: activeTab === 'run' }" @click="activeTab = 'run'">Run</button>
        <button class="tab-btn" :class="{ active: activeTab === 'config' }" @click="activeTab = 'config'">Settings</button>
      </nav>
    </header>

    <div x-show="activeTab === 'run'">
      <div class="section">
        <div class="section-label">Manual run</div>
        <div class="row">
          <label>Playlist</label>
          <select x-model="playlist">
            <option value="weekly-exploration">Weekly Exploration</option>
            <option value="weekly-jams">Weekly Jams</option>
            <option value="daily-jams">Daily Jams</option>
          </select>
          <label>Download mode</label>
          <select x-model="dlmode">
            <option value="normal">normal</option>
            <option value="skip">skip</option>
            <option value="force">force</option>
          </select>
          <label class="check-label"><input type="checkbox" x-model="noPersist"> no persist</label>
          <label class="check-label"><input type="checkbox" x-model="excludeLocal"> exclude local</label>
        </div>
        <div class="row">
          <button class="run-btn" @click="startRun()" :disabled="running">▶ Run</button>
          <button class="stop-btn" @click="stopRun()" x-show="running">■ Stop</button>
          <span id="status" x-text="status"></span>
        </div>
      </div>
      <div class="section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="section-label" style="margin-bottom:0">Output</div>
          <label class="check-label" style="font-size:11px">
            <input type="checkbox" x-model="rawLog"> Raw
          </label>
        </div>
        <div id="log">
          <template x-for="(entry, i) in logEntries" :key="i">
            <div>
              <div class="log-line" x-show="!rawLog">
                <span class="log-time" x-text="entry.time"></span>
                <span class="log-badge" x-show="entry.level !== 'INFO'" :class="'level-' + entry.level.toLowerCase()" x-text="entry.level"></span>
                <span class="log-msg" x-text="entry.msg"></span>
                <span class="log-track" x-show="entry.track" x-text="entry.track"></span>
                <span class="log-system" x-show="entry.system" x-text="entry.system"></span>
              </div>
              <div class="log-raw" x-show="rawLog" x-text="entry.raw"></div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div x-show="activeTab === 'config'">
      <div class="section">
        <div class="section-label">Setup</div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start">
          <button class="setup-btn" @click="step = 1; view = 'wizard'">Re-run setup wizard →</button>
          <button class="setup-btn" style="color:#c0392b" @click="resetConfig()">Reset all settings</button>
        </div>
      </div>
    </div>
  </div>
</div>
{{end}}
